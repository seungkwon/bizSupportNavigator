services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bizsupport}
      POSTGRES_USER: ${POSTGRES_USER:-bizsupport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bizsupport}
    ports:
      - "9000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bizsupport}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
