services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bizsupport}
      POSTGRES_USER: ${POSTGRES_USER:-bizsupport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bizsupport}
    ports:
      - "9000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bizsupport}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Version pinned to match the chromadb Python client (backend/requirements.txt) --
  # client/server protocol isn't stable across chromadb versions (confirmed: client
  # 1.5.9 against server 0.6.3 fails create_collection with `KeyError('_type')`).
  chroma:
    image: chromadb/chroma:1.5.9
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data

volumes:
  postgres_data:
  chroma_data:
